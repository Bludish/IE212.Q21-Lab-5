version: "3.8"

services:
  # ---------------------------------------------------------------
  # HẠ TẦNG DỮ LIỆU LỚN: Kafka (message broker) + Zookeeper
  # ---------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - people-counting-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Tăng giới hạn kích thước message vì payload chứa ảnh JPEG (base64)
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_REPLICA_FETCH_MAX_BYTES: 5242880
    networks:
      - people-counting-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Tạo sẵn 2 topic cần thiết khi Kafka đã sẵn sàng
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw-frames --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic detections --partitions 1 --replication-factor 1 &&
      echo 'Topics created successfully'
      "
    networks:
      - people-counting-net

  # ---------------------------------------------------------------
  # SERVER LƯU TRỮ: MongoDB
  # ---------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - people-counting-net

  # ---------------------------------------------------------------
  # SERVER 1: Nhận khung hình từ "camera" (video mp4) và gửi vào Kafka
  # ---------------------------------------------------------------
  capture-server:
    build: ./capture_server
    container_name: capture-server
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_RAW_FRAMES: raw-frames
      VIDEO_PATH: /app/videos/sample.mp4
      CAMERA_ID: cam01
      TARGET_FPS: 5
      FRAME_WIDTH: 640
    volumes:
      - ./sample_videos:/app/videos:ro
    networks:
      - people-counting-net

  # ---------------------------------------------------------------
  # SERVER 2: Nhận diện người (YOLOv8n) và gửi bounding box vào Kafka
  # ---------------------------------------------------------------
  processing-server:
    build: ./processing_server
    container_name: processing-server
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_RAW_FRAMES: raw-frames
      KAFKA_TOPIC_DETECTIONS: detections
      KAFKA_CONSUMER_GROUP: processing-group
      MODEL_NAME: yolov8n.pt
      CONF_THRESHOLD: 0.4
    networks:
      - people-counting-net

  # ---------------------------------------------------------------
  # SERVER 3: Lưu kết quả nhận diện vào MongoDB
  # ---------------------------------------------------------------
  storage-server:
    build: ./storage_server
    container_name: storage-server
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_DETECTIONS: detections
      KAFKA_CONSUMER_GROUP: storage-group
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: people_counting
      MONGO_COLLECTION: detections
    networks:
      - people-counting-net

networks:
  people-counting-net:
    driver: bridge

volumes:
  mongo-data:
